name: CI

# Gate every PR on typecheck + tests + build.
#
# TypeScript gates (in order of strictness):
#
# 1. CRITICAL-PATH ZERO-ERROR GATE (hardest)
#    Files in src/utils/(pdfGenerator|reportGenerator|creditworthinessPDF)
#    and src/components/(expenses|sales|payroll)/ MUST have ZERO TS errors,
#    no exceptions, regardless of total budget. Real bugs in financial
#    code paths are unacceptable.
#
# 2. TOTAL BUDGET GATE (medium)
#    The whole codebase has a hard budget of TS_BUDGET errors. The
#    intent is to ratchet this down over time as cleanup PRs land.
#    Bumping the number requires a Brief #4-style cleanup PR.
#
# 3. NO-NEW-ERRORS GATE (softest, kept for back-compat)
#    PR branch error count must be ≤ main's. Catches drift between
#    cleanup PRs.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # Total TS error budget — the cap below which the whole codebase must
  # stay. Set to current baseline + small headroom; bump down when a
  # cleanup PR lands.
  TS_BUDGET: '180'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test

      - name: Run production build
        run: npm run build

  typecheck-no-new-errors:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Count TypeScript errors on PR branch
        id: pr_errors
        run: |
          set +e
          npx tsc --noEmit -p tsconfig.app.json 2>&1 | tee /tmp/pr_tsc.log
          PR_COUNT=$(grep -cE "^src/.*: error TS" /tmp/pr_tsc.log || echo 0)
          echo "count=$PR_COUNT" >> $GITHUB_OUTPUT
          echo "PR branch TypeScript errors: $PR_COUNT"

      - name: Checkout main
        run: |
          git fetch origin main
          git checkout origin/main
          npm ci

      - name: Count TypeScript errors on main
        id: main_errors
        run: |
          set +e
          npx tsc --noEmit -p tsconfig.app.json 2>&1 | tee /tmp/main_tsc.log
          MAIN_COUNT=$(grep -cE "^src/.*: error TS" /tmp/main_tsc.log || echo 0)
          echo "count=$MAIN_COUNT" >> $GITHUB_OUTPUT
          echo "main TypeScript errors: $MAIN_COUNT"

      - name: Fail if PR introduces new TypeScript errors
        run: |
          PR=${{ steps.pr_errors.outputs.count }}
          MAIN=${{ steps.main_errors.outputs.count }}
          if [ "$PR" -gt "$MAIN" ]; then
            echo "::error::PR adds $((PR - MAIN)) new TypeScript errors (main: $MAIN, PR: $PR). Fix the new errors or the baseline drift."
            exit 1
          fi
          echo "OK — PR errors ($PR) ≤ main errors ($MAIN)"

  typecheck-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Total error budget gate
        run: |
          set +e
          npx tsc --noEmit -p tsconfig.app.json 2>&1 | tee /tmp/tsc.log > /dev/null
          COUNT=$(grep -cE "^src/.*: error TS" /tmp/tsc.log || echo 0)
          echo "Total TS errors: $COUNT (budget: $TS_BUDGET)"
          if [ "$COUNT" -gt "$TS_BUDGET" ]; then
            echo "::error::TS error count $COUNT exceeds budget of $TS_BUDGET. Reduce errors before merging or, with reviewer approval, raise TS_BUDGET in .github/workflows/ci.yml after a Brief #4-style cleanup PR."
            exit 1
          fi
          echo "OK — within budget."

  typecheck-critical-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Critical-path zero-error gate
        # Files in financial-report path (pdfGenerator/reportGenerator/
        # creditworthinessPDF) and money-handling components (expenses/
        # sales/payroll/) MUST have zero TS errors. No tolerance.
        run: |
          set +e
          npx tsc --noEmit -p tsconfig.app.json 2>&1 | tee /tmp/tsc.log > /dev/null
          CRIT=$(grep -E "^src/(utils/(pdfGenerator|reportGenerator|creditworthinessPDF)\.ts|components/(expenses|sales|payroll)/)" /tmp/tsc.log | grep -c "error TS" || echo 0)
          if [ "$CRIT" -gt 0 ]; then
            echo "::error::$CRIT TS error(s) in critical-path files. The financial-report code path must stay at zero TS errors."
            grep -E "^src/(utils/(pdfGenerator|reportGenerator|creditworthinessPDF)\.ts|components/(expenses|sales|payroll)/)" /tmp/tsc.log | grep "error TS" | head -20
            exit 1
          fi
          echo "OK — critical path has zero TS errors."
