<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Edentrack</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f0e8 0%, #ebe4d8 50%, #f0e9dd 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 24px;
      padding: 48px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
    }
    
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: #fbbf24;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    
    h1 {
      color: #4A3124;
      font-size: 24px;
      margin-bottom: 16px;
    }
    
    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    
    .status {
      display: inline-block;
      background: #fef3c7;
      color: #92400E;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Don't worry! Your data is saved locally and will sync automatically when your connection is restored.</p>
    <p>You can continue working - all your entries will be queued for sync.</p>
    <div class="status">Data will sync when online</div>
  </div>
  
  <script>
    // Check connection status
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
